<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Read iframe</title>
<style>
table{
    border-collapse:collapse;
    width:500px;
}
th,td{
    border:1px solid #ccc;
    padding:8px;
}
</style>
</head>
<body>

<iframe
    id="apiFrame"
    src="https://yagami-cell.com/test_game_inject/test_pln/32144801258"
    style="display:none">
</iframe>

<table>
    <tr>
        <th>ID PLN</th>
        <td id="idpln">-</td>
    </tr>
    <tr>
        <th>Nama</th>
        <td id="nama">-</td>
    </tr>
    <tr>
        <th>Daya</th>
        <td id="daya">-</td>
    </tr>
</table>

<script>
const iframe = document.getElementById("apiFrame");

iframe.onload = () => {
    try {
        const text = iframe.contentWindow.document.body.innerText;
        const json = JSON.parse(text);

        document.getElementById("idpln").textContent = json.data.idpln;
        document.getElementById("nama").textContent = json.data.nama;
        document.getElementById("daya").textContent = json.data.daya;

    } catch(e){
        console.error(e);
        alert("Tidak dapat membaca iframe karena berbeda domain (Same-Origin Policy).");
    }
}
</script>

</body>
</html>
